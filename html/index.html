<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyWeb - Du Lịch Nha Trang</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="site-header">
    <div class="brand">MyWeb</div>

    <nav class="main-nav">
        <a href="#about">Giới thiệu</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Liên hệ</a>
    </nav>
</header>

<main>

    <!-- HERO -->
    <section class="hero">
        <img src="../img/hero.jpg" alt="Nha Trang">

        <h1 id="main-title">Khám Phá Nha Trang</h1>

        <p class="lead">
            Thành phố biển nổi tiếng với du lịch, ẩm thực và cảnh đẹp thiên nhiên.
        </p>

        <a href="#portfolio" class="primary-button">Khám phá ngay</a>
    </section>

    <!-- ABOUT -->
    <section id="about" class="about">
        <h2>Giới Thiệu</h2>
        <p>
            Nha Trang là thành phố biển nổi tiếng với cảnh đẹp và ẩm thực phong phú.
        </p>
    </section>

    <!-- PORTFOLIO -->
    <section id="portfolio">
        <h2>Portfolio</h2>

        <div class="portfolio-grid">

            <figure class="gallery-item">
                <img src="../img/detail-1.jpg" alt="">
                <figcaption>Trung tâm thành phố</figcaption>
            </figure>

            <figure class="gallery-item">
                <img src="../img/am-thuc.jpg" alt="">
                <figcaption>Ẩm thực</figcaption>
            </figure>

            <figure class="gallery-item">
                <img src="../img/nha-tho.jpg" alt="">
                <figcaption>Nhà thờ Đá</figcaption>
            </figure>

        </div>
    </section>

    <!-- CONTACT -->
    <section id="contact">
        <h2>Liên Hệ</h2>

        <form class="contact-form">

            <input type="text" placeholder="Họ tên" required>
            <input type="email" placeholder="Email" required>

            <textarea rows="4" placeholder="Nội dung" required></textarea>

            <button type="submit" class="primary-button">Gửi liên hệ</button>

        </form>
    </section>

</main>

<footer>
    <p>© 2026 MyWeb - Du Lịch Nha Trang</p>
</footer>

</body>
</html>
